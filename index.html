<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./style.css" />

    <title>Joseph's Movie Watchlist</title>

    <script src="./script.js" defer></script>
  </head>

  <body>
    <header>
      <h1>Joseph's Movie Watchlist</h1>
      <p>Add movies, rate them, and keep track of what you have watched.</p>
    </header>

    <main>
        <!-- Movie Form Section -->
<section class="form-section">
  <h2>Add a Movie</h2>

  <form id="movie-form">
    <div class="form-group">
      <label for="movie-title">Movie Title</label>

      <input
        type="text"
        id="movie-title"
        name="movieTitle"
        placeholder="Enter a movie title"
        minlength="2"
        maxlength="50"
        required
      />

      <p id="title-error" class="error-message"></p>
    </div>

    <div class="form-group">
      <label for="movie-genre">Genre</label>

      <select id="movie-genre" name="movieGenre" required>
        <option value="">Choose a genre</option>
        <option value="Action">Action</option>
        <option value="Comedy">Comedy</option>
        <option value="Drama">Drama</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Horror">Horror</option>
        <option value="Sci-Fi">Sci-Fi</option>
      </select>
    </div>

    <div class="form-group">
      <label for="movie-rating">Rating</label>

      <input
        type="number"
        id="movie-rating"
        name="movieRating"
        placeholder="1 through 10"
        min="1"
        max="10"
        required
      />

      <p id="rating-error" class="error-message"></p>
    </div>

    <button type="submit" id="add-movie-btn">Add Movie</button>
  </form>
</section>
    </main>

    <footer>
      <p>Created by Joseph Garcia for SBA 316</p>
    </footer>
  </body>
</html>
